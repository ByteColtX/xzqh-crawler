[database]
path = "./data/xzqh.db"

[api]
base_url = "https://dmfw.mca.gov.cn"
timeout = 30
max_retries = 3
retry_delay = 1.0

[crawler]
max_workers = 10
batch_size = 100
fetch_townships = true  # 是否获取乡级数据
township_batch_delay = 2.0  # 乡级数据批次间延迟（秒）
township_max_retries = 3  # 乡级数据最大重试次数

[logging]
level = "INFO"